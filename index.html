<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dear God</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ==========================
  LANDING PAGE
  =========================== -->

  <section id="landing-page">

    <img
      class="landing-bg"
      src="assets/background.png"
      alt=""
    />

    <div class="landing-composition">

      <img
        class="landing-frame"
        src="assets/frame.png"
        alt=""
      />

      <img
        class="dear-god"
        src="assets/dear-god.png"
        alt="Dear God,"
      />

      <img
        class="by-ame"
        src="assets/by-ame.png"
        alt="by amè"
      />

      <img
        class="drag-arrow"
        src="assets/drag-to-start-arrow.png"
        alt="drag to start"
      />

    </div>


    <!-- LANDING CONTROLS -->

    <nav
      class="landing-buttons"
      aria-label="landing controls"
    >

      <button
        id="sound-toggle"
        type="button"
        aria-label="toggle sound"
      >
        <img
          id="sound-toggle-image"
          src="assets/sound-off-btn.png"
          alt="sound off"
        />
      </button>


      <button
        id="instruction-button"
        type="button"
        aria-label="open instructions"
      >
        <img
          src="assets/instruction-button.png"
          alt="instruction"
        />
      </button>


      <button
        id="info-button"
        type="button"
        aria-label="open information"
      >
        <img
          src="assets/info.png"
          alt="information"
        />
      </button>

    </nav>


    <!-- BACKGROUND MUSIC -->

    <audio
      id="bg-music"
      loop
    >
      <source
        src="assets/geoffharvey-finding-mithral-openworld-game-375527.mp3"
        type="audio/mpeg"
      >
    </audio>

  </section>


  <!-- ==========================
  INFORMATION PANEL
  =========================== -->

  <section
    id="info-panel"
    aria-label="information panel"
  >

    <button
      id="close-info"
      type="button"
      aria-label="close information"
    >
      ×
    </button>

    <img
      id="info-panel-image"
      src="assets/information-panel.png"
      alt="Information about Dear God"
    />

  </section>


  <!-- ==========================
  INSTRUCTION PANEL
  =========================== -->

  <section
    id="instruction-panel"
    aria-label="instruction panel"
  >

    <button
      id="close-instruction"
      type="button"
      aria-label="close instruction"
    >
      ×
    </button>

    <img
      id="instruction-panel-image"
      src="assets/instruction-panel.png"
      alt="Instructions for Dear God"
    />

  </section>


  <!-- ==========================
  MAIN INTERACTION INPUT
  =========================== -->

  <section id="input-panel">

    <img
      id="question-image"
      src="assets/question.png"
      alt="What is God to you?"
    />

    <div id="answer-row">

      <div id="type-bar-wrap">

        <img
          id="type-bar-image"
          src="assets/type-bar.png"
          alt=""
        />

        <input
          id="god-input"
          type="text"
          maxlength="40"
          autocomplete="off"
          aria-label="type your word"
        />

      </div>

      <button
        id="submit-button"
        type="button"
        aria-label="send"
      >
        <img
          id="send-button-image"
          src="assets/send-button.png"
          alt="send"
        />
      </button>

    </div>

  </section>


  <!-- ==========================
  ERASE
  =========================== -->

  <section id="erase-panel">

    <span id="erase-label">
      erase
    </span>

    <input
      id="erase-slider"
      type="range"
      min="0"
      max="100"
      value="0"
      step="1"
      aria-label="erase canvas"
    >

  </section>


  <script src="script.js"></script>

</body>
</html>
