<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>What is God to You?</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- LANDING PAGE -->
  <section id="landing-page">
    <img class="landing-bg" src="assets/background.png" alt="" />

    <div class="landing-composition">
      <img class="frame" src="assets/frame.png" alt="" />
      <img class="what-is" src="assets/what-is.png" alt="What is" />
      <img class="god-title" src="assets/god-title.png" alt="God?" />
      <img class="arrow" src="assets/arrow.png" alt="drag to start" />
    </div>
  </section>

 <!-- MAIN INTERACTION INPUT -->
<section id="input-panel">
  <img
    id="question-image"
    src="assets/question.png"
    alt="What is God to you?"
  />

  <div id="answer-row">
    <div id="type-bar-wrap">
      <img
        id="type-bar-image"
        src="assets/type-bar.png"
        alt=""
      />

      <input
        id="god-input"
        type="text"
        maxlength="40"
        autocomplete="off"
      />
    </div>

    <button id="submit-button" aria-label="send">
      <img
        id="send-button-image"
        src="assets/send-button.png"
        alt="send"
      />
    </button>
  </div>
</section>

  <!-- ERASE SLIDER -->
  <section id="erase-panel">
    <span>erase</span>

    <input
      id="erase-slider"
      type="range"
      min="0"
      max="100"
      value="0"
    />
  </section>

  <script src="script.js"></script>
</body>
</html>
