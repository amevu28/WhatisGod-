<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dear God</title>

  <link rel="stylesheet" href="style.css" />
</head>


<body>

  <!--
  =====================================================
  PROJECT STATEMENT — DEAR GOD
  =====================================================

  Dear God is an interactive experience that invites each user
  to build a connected map of what “Dear God” means to them.

  My starting point comes from my own Christian faith, especially
  the idea of the Trinity and the way God is described through
  qualities such as love, courage, presence, forgiveness, and truth.
  These words form my first interpretation of “Dear God”.

  However, this project does not ask the audience to agree with my
  definition. Instead, it leaves space for each person to bring their
  own version of Dear God into the work. Their Dear God might be a
  person, a place, a feeling, a memory, or something they cannot fully
  explain.

  I chose dragging as the main interaction because it feels slower and
  more intentional than clicking. Dragging makes the user physically
  reveal, move, and rearrange meaning. As users add their own words,
  my original interpretation gradually fades and makes room for theirs.
  The canvas becomes a shared but personal map, where different
  definitions can appear, connect, move, and disappear.
  -->


  <!--
  =====================================================
  1. LANDING PAGE
  This is the entry point of the experience.
  It uses image assets designed in Illustrator.
  =====================================================
  -->

  <section id="landing-page">

    <!-- Background image -->
    <img
      class="landing-bg"
      src="assets/background.png"
      alt=""
      aria-hidden="true"
    />


    <!-- Main landing composition -->
    <div class="landing-composition">

      <img
        class="landing-frame"
        src="assets/frame.png"
        alt=""
        aria-hidden="true"
      />

      <img
        class="dear-god"
        src="assets/dear-god.png"
        alt="Dear God,"
      />

      <img
        class="by-ame"
        src="assets/by-ame.png"
        alt="by amè"
      />

      <img
        class="drag-arrow"
        src="assets/drag-to-start-arrow.png"
        alt="drag to start"
      />

    </div>


    <!--
    Landing controls:
    - sound button controls background music
    - instruction button opens interaction guide
    - information button opens project information
    -->

    <nav
      class="landing-buttons"
      aria-label="landing controls"
    >

      <button
        id="instruction-button"
        type="button"
        aria-label="open instructions"
      >
        <img
          src="assets/instruction-button.png"
          alt="instruction"
        />
      </button>


      <button
        id="sound-toggle"
        type="button"
        aria-label="toggle sound"
      >
        <img
          id="sound-toggle-image"
          src="assets/sound-off-btn.png"
          alt="sound off"
        />
      </button>


      <button
        id="info-button"
        type="button"
        aria-label="open information"
      >
        <img
          src="assets/info.png"
          alt="information"
        />
      </button>

    </nav>


    <!--
BACKGROUND MUSIC

Free Music Track:
"Finding Mithral (Open World Game)"
by Geoff Harvey

Source: Pixabay -->

    <audio
      id="bg-music"
      loop
    >
      <source
        src="assets/geoffharvey-finding-mithral-openworld-game-375527.mp3"
        type="audio/mpeg"
      />
    </audio>

  </section>



  <!--
  =====================================================
  2. INFORMATION PANEL
  This panel explains the concept of the project.
  It appears when the user opens the information button.
  =====================================================
  -->

  <section
    id="info-panel"
    aria-label="information panel"
  >

    <button
      id="close-info"
      type="button"
      aria-label="close information"
    >
      ×
    </button>

    <img
      id="info-panel-image"
      src="assets/information-panel.png"
      alt="Information about Dear God"
    />

  </section>



  <!--
  =====================================================
  3. INSTRUCTION PANEL
  This panel explains how to interact with the work.
  It appears when the user opens the instruction button.
  =====================================================
  -->

  <section
    id="instruction-panel"
    aria-label="instruction panel"
  >

    <button
      id="close-instruction"
      type="button"
      aria-label="close instruction"
    >
      ×
    </button>

    <img
      id="instruction-panel-image"
      src="assets/instruction-panel.png"
      alt="Instructions for Dear God"
    />

  </section>



  <!--
  =====================================================
  4. MAIN INTERACTION INPUT
  This is where users type and submit their own words.
  The assets were made in Adobe Illustrator.
  =====================================================
  -->

  <section
    id="input-panel"
    aria-label="word input panel"
  >

    <img
      id="question-image"
      src="assets/question.png"
      alt="What is God to you?"
    />


    <div id="answer-row">

      <div id="type-bar-wrap">

        <img
          id="type-bar-image"
          src="assets/type-bar.png"
          alt=""
          aria-hidden="true"
        />

        <input
          id="god-input"
          type="text"
          maxlength="40"
          autocomplete="off"
          aria-label="type your word"
        />

      </div>


      <button
        id="submit-button"
        type="button"
        aria-label="send word"
      >
        <img
          id="send-button-image"
          src="assets/send-button.png"
          alt="send"
        />
      </button>

    </div>

  </section>



  <!--
  =====================================================
  5. ERASE CONTROL
  The erase slider allows users to remove everything from the canvas.
  Conceptually, it acts like clearing space or letting go of old definitions as we grow and start again.
  =====================================================
  -->

  <section
    id="erase-panel"
    aria-label="erase canvas panel"
  >

    <span id="erase-label">
      erase
    </span>

    <input
      id="erase-slider"
      type="range"
      min="0"
      max="100"
      value="0"
      step="1"
      aria-label="erase canvas"
    />

  </section>



  <!--
  =====================================================
  6. JAVASCRIPT
  =====================================================
  -->

  <script src="script.js"></script>

</body>

</html>
